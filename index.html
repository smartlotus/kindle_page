<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Kindle Dashboard</title>
    <link rel="stylesheet" href="./styles.css?v=20260329f" />
  </head>
  <body>
    <main class="dashboard" aria-live="polite">
      <section class="card settings-card" aria-label="页面设置">
        <div class="settings-head">
          <button id="settingsToggleBtn" class="settings-toggle-btn" type="button" aria-label="展开设置">⚙ 设置</button>
          <span id="keepAwakeStatus" class="settings-status">防息屏：关闭</span>
        </div>
        <div id="settingsPanel" class="settings-panel settings-hidden">
          <div class="settings-row">
            <label for="keepAwakeToggle" class="settings-label">防息屏</label>
            <input id="keepAwakeToggle" class="settings-check" type="checkbox" />
          </div>
          <div class="settings-row">
            <label for="keepAwakeIntervalSelect" class="settings-label">心跳频率</label>
            <select id="keepAwakeIntervalSelect" class="settings-select" aria-label="防息屏心跳频率">
              <option value="15">15 秒</option>
              <option value="30">30 秒</option>
              <option value="60">60 秒</option>
              <option value="120">120 秒</option>
            </select>
          </div>
          <div class="settings-row">
            <label for="pageRefreshSelect" class="settings-label">自动刷新</label>
            <select id="pageRefreshSelect" class="settings-select" aria-label="页面自动刷新频率">
              <option value="2">2 分钟</option>
              <option value="5">5 分钟</option>
              <option value="10">10 分钟</option>
              <option value="15">15 分钟</option>
              <option value="30">30 分钟</option>
            </select>
          </div>
          <p class="settings-note">提示：防息屏是尽力模式，不同 Kindle 版本效果可能不同。</p>
        </div>
        <span id="keepAwakePulse" class="keepalive-pulse">0</span>
      </section>

      <section class="card clock-card" aria-label="桌面时钟">
        <p class="card-title">桌面时钟</p>
        <div class="clock-scale-controls" role="group" aria-label="时钟缩放控制">
          <button id="clockScaleDownBtn" class="clock-scale-btn" type="button" aria-label="缩小">-</button>
          <button id="clockScaleUpBtn" class="clock-scale-btn" type="button" aria-label="放大">+</button>
          <button id="clockScaleResetBtn" class="clock-scale-btn clock-scale-reset" type="button" aria-label="重置">
            重置
          </button>
          <span id="clockScaleLabel" class="clock-scale-label">100%</span>
        </div>
        <div id="clockScaleHost" class="clock-scale-host">
          <div id="clockScaleRoot" class="clock-scale-root">
            <p id="dateText" class="date-text">---- -- -- 星期-</p>
            <div class="time-main">
              <span id="hourText" class="hour-text">--</span>
              <span class="colon">:</span>
              <span id="minuteText" class="minute-text">--</span>
            </div>
            <p id="clockTimezoneText" class="clock-zone">时区：-</p>
            <p id="slotRangeText" class="slot-range">--</p>
            <div id="tenMinuteGrid" class="ten-grid" role="img" aria-label="十分钟时段进度"></div>
            <p id="refreshHint" class="hint">下一次自动刷新：--:--</p>
          </div>
        </div>
      </section>

      <section class="card weather-card" aria-label="天气提示">
        <p class="card-title">天气提示</p>
        <div class="clock-scale-controls" role="group" aria-label="天气模块缩放控制">
          <button id="weatherScaleDownBtn" class="clock-scale-btn" type="button" aria-label="缩小">-</button>
          <button id="weatherScaleUpBtn" class="clock-scale-btn" type="button" aria-label="放大">+</button>
          <button id="weatherScaleResetBtn" class="clock-scale-btn clock-scale-reset" type="button" aria-label="重置">
            重置
          </button>
          <span id="weatherScaleLabel" class="clock-scale-label">100%</span>
        </div>
        <div id="weatherScaleHost" class="clock-scale-host">
          <div id="weatherScaleRoot" class="clock-scale-root">
            <div class="weather-controls">
              <label for="cityGroupSelect" class="selector-label">区域</label>
              <select id="cityGroupSelect" class="selector-input" aria-label="选择城市区域"></select>
              <label for="citySelect" class="selector-label">城市</label>
              <select id="citySelect" class="selector-input" aria-label="选择城市"></select>
            </div>
            <p id="weatherMain" class="weather-main">正在获取天气...</p>
            <p id="weatherSub" class="weather-sub">请稍候</p>
            <p id="weatherUpdated" class="weather-updated"></p>
          </div>
        </div>
      </section>

      <section class="card quote-card" aria-label="每日一言">
        <p class="card-title">每日一言</p>
        <div class="clock-scale-controls" role="group" aria-label="每日一言模块缩放控制">
          <button id="quoteScaleDownBtn" class="clock-scale-btn" type="button" aria-label="缩小">-</button>
          <button id="quoteScaleUpBtn" class="clock-scale-btn" type="button" aria-label="放大">+</button>
          <button id="quoteScaleResetBtn" class="clock-scale-btn clock-scale-reset" type="button" aria-label="重置">
            重置
          </button>
          <span id="quoteScaleLabel" class="clock-scale-label">100%</span>
        </div>
        <div id="quoteScaleHost" class="clock-scale-host">
          <div id="quoteScaleRoot" class="clock-scale-root">
            <blockquote id="quoteText" class="quote-text">正在准备今日语录...</blockquote>
            <p id="quoteMeta" class="quote-meta"></p>
          </div>
        </div>
      </section>
    </main>

    <script src="./data/quote-library.js?v=20260329f"></script>
    <script src="./data/cities.js?v=20260329f"></script>
    <script src="./script.js?v=20260329f"></script>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
    <title>Kindle Dashboard</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="dashboard" aria-live="polite">
      <section class="card clock-card" aria-label="桌面时钟">
        <p class="card-title">桌面时钟</p>
        <div class="time-main">
          <span id="hourText" class="hour-text">--</span>
          <span class="colon">:</span>
          <span id="minuteSlotText" class="minute-text">--</span>
        </div>
        <p id="slotRangeText" class="slot-range">--</p>
        <div id="tenMinuteGrid" class="ten-grid" role="img" aria-label="十分钟时段进度"></div>
        <p id="refreshHint" class="hint">下一次自动刷新：--:--</p>
      </section>

      <section class="card weather-card" aria-label="天气提示">
        <p class="card-title">天气提示</p>
        <div class="weather-controls">
          <label for="cityGroupSelect" class="selector-label">区域</label>
          <select id="cityGroupSelect" class="selector-input" aria-label="选择城市区域"></select>
          <label for="citySelect" class="selector-label">城市</label>
          <select id="citySelect" class="selector-input" aria-label="选择城市"></select>
        </div>
        <p id="weatherMain" class="weather-main">正在获取天气...</p>
        <p id="weatherSub" class="weather-sub">请稍候</p>
        <p id="weatherUpdated" class="weather-updated"></p>
      </section>

      <section class="card quote-card" aria-label="每日一言">
        <p class="card-title">每日一言</p>
        <blockquote id="quoteText" class="quote-text">正在准备今日语录...</blockquote>
        <p id="quoteMeta" class="quote-meta"></p>
      </section>
    </main>

    <script src="./data/quote-library.js"></script>
    <script src="./data/cities.js"></script>
    <script src="./script.js"></script>
  </body>
</html>
